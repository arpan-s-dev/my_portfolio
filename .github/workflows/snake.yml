name: Generate Snake

# Regenerates the contribution-grid snake animation
# Runs every 12 hours and on every push to main, plus manually
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate contribution snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: arpan-s-dev
          # Two themed variants matching the site palette (lib in app/globals.css).
          # Arthur (default) -> ochre on warm browns, dots match the heatmap exactly.
          # Atie (-dark)     -> Atie purple accent on the GitHub-dark green dot palette.
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#c9a961&color_dots=#33281c,#54452b,#76623b,#977e4a,#c9a961
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#a855f7&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353

      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
